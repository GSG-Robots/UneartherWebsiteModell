<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unearther</title>
    <link rel="icon" href="/favicon.png" />
    <link rel="stylesheet" href="/style.css">
    <script src="/general.js"></script>
</head>

<body>
    <div id="content">
        <nav>
            <button id="menu-expand-button" class="menu-item">
                <img src="/icons/chevron-right.svg" />
                <span>Einklappen</span>
            </button>
            <a class="menu-item" href="/home">
                <img src="/icons/home.svg" /> <span>Dashboard</span>
            </a>
            <a class="menu-item selected" href="/" class="selected">
                <img src="/icons/video.svg" /> <span>Live</span>
            </a>
            <a class="menu-item" href="https://github.com/GSG-Robots">
                <img src="/icons/github.svg" /> <span>GitHub</span>
            </a>
            <a class="menu-item" href="/downloads">
                <img src="/icons/upload.svg" /> <span>Downloads</span>
            </a>
            <a class="menu-item" href="/story">
                <img src="/icons/file-text.svg" /> <span>Story</span>
            </a>
        </nav>
        <div id="page" role="presentation">
            <header>
                <button id="menu-button" class="menu-item">
                    <img src="/icons/menu.svg" />
                    <span>Einklappen</span>
                </button>
                <h1>Unearther</h1>
            </header>
            <div id="main-content" role="presentation">
                <main>
                    <section title="Live Stream" id="main">
                        <canvas id="canvas"></canvas>
                    </section>
                    <section title="Control" id="side">
                        <div class="column">
                            <div id="manualMode" only-when="manual mode">
                                <button class="button" id="switchToAuto">
                                    Switch to automatic control
                                </button>
                                <br>
                                <br>
                                <div class="row" style="width:100%; margin-bottom: 0.5em">
                                    <span class="flex-grow row" id="coords">0 0 0</span>
                                    <button class="button row" id="movePosition"
                                        should-be-disabled="{!globalState.motorController.isIdle}">
                                        <img src="/icons/edit-2.svg" />
                                    </button>
                                    <button id="home" class="button"
                                        should-be-disabled="{!globalState.motorController.isIdle}">
                                        <img src="/icons/home.svg" />
                                    </button>
                                    <button id="drill" class="button">
                                        <img src="/icons/fan.svg" />
                                    </button>
                                </div>
                                <div class="movement-controls row">
                                    <div class="column">
                                        <button class="button" id="moveZneg"
                                            should-be-disabled="{!globalState.motorController.isIdle}">
                                            <img src="/icons/arrow-up.svg" />
                                        </button>
                                        <button class="button" id="moveZpos"
                                            should-be-disabled="{!globalState.motorController.isIdle}">
                                            <img src="/icons/arrow-down.svg" />
                                        </button>
                                    </div>
                                    <div class="movement-arrows">
                                        <button id="moveXneg" class="button diagonal"
                                            should-be-disabled="{!globalState.motorController.isIdle}">
                                            <img src="/icons/arrow-left.svg" />
                                        </button>
                                        <button id="moveXpos" class="button diagonal"
                                            should-be-disabled="{!globalState.motorController.isIdle}">
                                            <img src="/icons/arrow-right.svg" />
                                        </button>
                                        <button id="moveYpos" class="button diagonal"
                                            should-be-disabled="{!globalState.motorController.isIdle}">
                                            <img src="/icons/arrow-up.svg" />
                                        </button>
                                        <button id="moveYneg" class="button diagonal"
                                            should-be-disabled="{!globalState.motorController.isIdle}">
                                            <img src="/icons/arrow-down.svg" />
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div id="autoMode" only-when="automode">
                                <button class="button" id="switchToManual"
                                    should-be-disabled="{!globalState.digger.isPaused}">
                                    Switch to manual control
                                </button>

                                <span id="layer">
                                    Layer: ?
                                    <!-- (Idle)
                                    (Done)
                                    (Paused)
                                    (In Progress) -->
                                </span>
                                <span>
                                    <button class="button" id="start"
                                        only-when="globalState.digger.isFinished || globalState.digger.isNotStarted || globalState.digger.isPaused">
                                        <img src="/icons/play.svg" />
                                    </button>
                                    <button class="button" id="pause" only-when="running">
                                        <img src="/icons/pause.svg" />
                                    </button>
                                    <button class="button" id="stop"
                                        should-be-disabled="{globalState.digger.isFinished || globalState.digger.isNotStarted}">
                                        <img src="/icons/square.svg" />
                                    </button>
                                </span>

                                <div class="row" id="coords2">0 0 0</div>
                            </div>
                        </div>
                    </section>
                </main>
            </div>
        </div>
    </div>

    <style>
        #livestream {
            width: 100%;
            height: 100%;
            border-radius: 5px;
            object-fit: contain;
            rotate: 90deg;
        }

        .movement-arrows {
            grid-area: arrows;
            display: grid;
            grid-template-areas:
                ".  aforward ."
                "aleft . aright"
                ".  aback .";
            grid-template-columns: repeat(3, 30px);
            grid-template-rows: repeat(3, 30px);
            gap: 10px;
            justify-items: center;
            align-items: center;
            place-items: center;
            padding: 20px;
            width: 150px;
            height: 150px;
        }

        #moveXneg {
            grid-area: aleft;
        }

        #moveXpos {
            grid-area: aright;
        }

        #moveYpos {
            grid-area: aforward;
        }

        #moveYneg {
            grid-area: aback;
        }

        #home {
            grid-area: home;
        }

        .diagonal {
            width: calc(1.5em + 20px);
            height: calc(1.5em + 20px);
            padding: 0;
            rotate: 45deg;
            display: grid;
            place-items: center;

            >* {
                rotate: -45deg;
            }
        }

        #autoMode {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #drill img {
            animation: rotate 1s infinite linear;
            animation-play-state: paused;
        }

        #drill.rotate img {
            animation-play-state: running;
        }

        main {
            height: 100%;

            display: flex;
            flex-direction: row;
            gap: 10px;
        }

        #main {
            width: 60%;
            height: 100%;
            width: auto;
            aspect-ratio: 1;

            &>* {
                border-radius: 5px;
            }
        }

        #side {
            flex: 1 1;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid var(--border);
        }

        @media (width <=900px) {
            main {
                flex-direction: column;
            }

            #main {
                width: 100%;
                height: auto;
                max-height: 70%;
            }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js"
            }
        }
    </script>
    <script type="module" src="/live.js"></script>
</body>

</html>
